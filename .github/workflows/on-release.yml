name: Archive and Release

on:
  release:
    types: [published]

jobs:
  zip-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: vimtor/action-zip@v1.3
        with:
          files: BetterNSTTS.toc main.lua
          dest: BetterNSTTS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: ${{ github.workspace }}/BetterNSTTS.zip